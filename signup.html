<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your TechOne account and unlock exclusive deals, order tracking, and a personalized experience.">
    <title>Create Account – TechOne</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <!-- Logo -->
    <a href="index.html" class="login-logo" aria-label="TechOne Home"></a>

    <!-- Sign Up Card -->
    <div class="login-card">
        <h2>Create account</h2>
        <form action="index.html">
            <label for="name">Your name</label>
            <input type="text" id="name" placeholder="First and last name" required>

            <label for="email">Email or mobile number</label>
            <input type="text" id="email" placeholder="you@email.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="At least 6 characters" required>
            <p style="font-size: 0.75rem; margin-top: -10px; margin-bottom: 15px; color: #555;">
                <i class="fa-solid fa-info-circle" style="color: #0066c0;"></i> Passwords must be at least 6 characters.
            </p>

            <label for="password-confirm">Re-enter password</label>
            <input type="password" id="password-confirm" required>

            <button type="submit" class="login-btn">Continue</button>
        </form>

        <p class="login-footer-links">
            By creating an account, you agree to TechOne's <a href="#">Conditions of Use</a> and <a href="#">Privacy Notice</a>.
        </p>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <p style="font-size: 0.85rem;">
            Already have an account? <a href="login.html" style="color: #0066c0; text-decoration: none;">Sign in <i class="fa-solid fa-caret-right"></i></a>
        </p>
    </div>

    <hr style="width: 350px; border: 0; border-top: 1px solid #ddd; margin: 30px 0 20px;">

    <div style="font-size: 0.75rem; color: #555; display: flex; gap: 20px; margin-bottom: 10px;">
        <a href="#" style="color: #0066c0; text-decoration: none;">Conditions of Use</a>
        <a href="#" style="color: #0066c0; text-decoration: none;">Privacy Notice</a>
        <a href="#" style="color: #0066c0; text-decoration: none;">Help</a>
    </div>
    <p style="font-size: 0.7rem; color: #555;">© 2025 TechOne Limited</p>

</body>
</html>
