<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your TechOne Wishlist – Save your favorite tech products for later.">
    <title>Your Wishlist – TechOne</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="cart-body">

<!-- ===== HEADER ===== -->
<header class="site-header">
    <nav class="navbar">
        <div class="navbar-inner">

            <a href="index.html" class="nav-logo">
                <div class="logo-img"></div>
            </a>

            <div class="nav-deliver">
                <i class="fa-solid fa-location-dot nav-deliver-icon"></i>
                <div>
                    <span class="nav-sub-label">Deliver to</span>
                    <select class="country-select">
                        <option value="BD">Bangladesh</option>
                        <option value="US">USA</option>
                        <option value="UK">UK</option>
                    </select>
                </div>
            </div>

            <div class="nav-search">
                <select class="search-category">
                    <option>All</option>
                </select>
                <input type="text" class="search-input" placeholder="Search saved items...">
                <button class="search-btn" aria-label="Search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div class="nav-right">
                <a href="login.html" class="nav-item">
                    <span class="nav-sub-label">Hello, Sign in</span>
                    <span class="nav-main-label">Account <i class="fa-solid fa-chevron-down nav-chevron"></i></span>
                </a>
                <a href="wishlist.html" class="nav-item" id="nav-wishlist">
                    <div class="cart-icon-wrap">
                        <i class="fa-solid fa-heart"></i>
                        <span class="wishlist-badge">0</span>
                    </div>
                    <span class="nav-main-label">Wishlist</span>
                </a>
                <a href="compare.html" class="nav-item" id="nav-compare">
                    <div class="cart-icon-wrap">
                        <i class="fa-solid fa-scale-balanced"></i>
                        <span class="compare-badge">0</span>
                    </div>
                    <span class="nav-main-label">Compare</span>
                </a>
                <a href="cart.html" class="nav-item nav-cart">
                    <div class="cart-icon-wrap">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="cart-badge">0</span>
                    </div>
                    <span class="nav-main-label">Cart</span>
                </a>
            </div>

        </div>
    </nav>
</header>

<!-- ===== WISHLIST MAIN ===== -->
<main class="cart-main">
    <div class="cart-left" style="flex: 1;">
        <h1>Your Wishlist</h1>
        <p class="price-header">My Selection</p>

        <div id="wishlist-items-container">
            <!-- Dynamic Items Injected Here -->
        </div>
    </div>
</main>

<!-- ===== FOOTER ===== -->
<footer class="site-footer">
    <p style="text-align:center; padding: 40px 0; color: #6c757d;">© 2025 TechOne Limited. Your favorite tech, saved.</p>
</footer>

<script>
    function updateBadges() {
        // Cart
        const cart = JSON.parse(localStorage.getItem('techone_cart')) || [];
        const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.querySelectorAll('.cart-badge').forEach(b => b.textContent = cartCount);

        // Wishlist
        const wishlist = JSON.parse(localStorage.getItem('techone_wishlist')) || [];
        document.querySelectorAll('.wishlist-badge').forEach(b => b.textContent = wishlist.length);

        // Compare
        const compare = JSON.parse(localStorage.getItem('techone_compare')) || [];
        document.querySelectorAll('.compare-badge').forEach(b => b.textContent = compare.length);
    }

    function renderWishlist() {
        const container = document.getElementById('wishlist-items-container');
        const wishlist = JSON.parse(localStorage.getItem('techone_wishlist')) || [];
        
        if (wishlist.length === 0) {
            container.innerHTML = `
                <div class="empty-cart-container">
                    <i class="fa-regular fa-heart"></i>
                    <h2>Your wishlist is empty</h2>
                    <p>Tap the heart icon on any product to save it for later!</p>
                    <a href="index.html" class="continue-shopping-btn">Explore Products</a>
                </div>
            `;
            updateBadges();
            return;
        }

        container.innerHTML = '';
        
        wishlist.forEach((item) => {
            container.innerHTML += `
                <div class="cart-item">
                    <div class="cart-item-img" style="background-image: url('${item.img}');"></div>
                    <div class="cart-item-info">
                        <h2>${item.name}</h2>
                        <span class="product-tag">${item.tag}</span>
                        <div class="cart-item-actions" style="margin-top: 15px;">
                            <button onclick='moveToCart(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="continue-shopping-btn" style="padding: 8px 15px; font-size: 0.8rem;">
                                <i class="fa-solid fa-cart-plus"></i> Add to Cart
                            </button>
                            <a href="javascript:void(0)" onclick="removeFromWishlist('${item.name}')" style="margin-left: 20px;">Remove</a>
                        </div>
                    </div>
                    <div class="cart-item-price">${item.price}</div>
                </div>
            `;
        });
        
        updateBadges();
    }

    function removeFromWishlist(name) {
        let wishlist = JSON.parse(localStorage.getItem('techone_wishlist')) || [];
        wishlist = wishlist.filter(item => item.name !== name);
        localStorage.setItem('techone_wishlist', JSON.stringify(wishlist));
        renderWishlist();
    }

    function moveToCart(product) {
        let cart = JSON.parse(localStorage.getItem('techone_cart')) || [];
        const existing = cart.find(i => i.name === product.name);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        localStorage.setItem('techone_cart', JSON.stringify(cart));
        updateBadges();
        alert("Added to cart!");
    }

    // Initial render
    renderWishlist();
</script>

</body>
</html>
