<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>TechOne Sign-In</title>
</head>
<body class="login-body">

    <a href="index.html" class="login-logo"></a>

    <div class="login-card">
        <h2>Sign-In</h2>
        <form action="index.html">
            <label for="email">Email or mobile phone number</label>
            <input type="text" id="email" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" required>

            <button type="submit" class="login-btn">Sign-In</button>
        </form>

        <p class="login-footer-links">
            By continuing, you agree to TechOne's <a href="#">Conditions of Use</a> and <a href="#">Privacy Notice</a>.
        </p>
        
        <p class="login-footer-links">
            <a href="#"><i class="fa-solid fa-caret-right"></i> Need help?</a>
        </p>
    </div>

    <div class="new-user-section">
        <p>New to TechOne?</p>
        <a href="signup.html" style="text-decoration: none;">
            <button class="create-account-btn">Create your TechOne account</button>
        </a>
    </div>

    <hr style="width: 350px; border: 0; border-top: 1px solid #ddd; margin: 30px 0 20px;">
    
    <div style="font-size: 0.75rem; color: #555; display: flex; gap: 20px; margin-bottom: 10px;">
        <a href="#" style="color: #0066c0; text-decoration: none;">Conditions of Use</a>
        <a href="#" style="color: #0066c0; text-decoration: none;">Privacy Notice</a>
        <a href="#" style="color: #0066c0; text-decoration: none;">Help</a>
    </div>
    <p style="font-size: 0.7rem; color: #555;">© 2024 TechOne Limited</p>

</body>
</html>
