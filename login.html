<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your TechOne account to access your orders, wishlist, and exclusive deals.">
    <title>Sign In – TechOne</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <!-- Back to Home -->
    <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

    <!-- Logo -->
    <a href="index.html" class="login-logo" aria-label="TechOne Home"></a>

    <!-- Login Card -->
    <div class="login-card">
        <h2>Sign In</h2>
        <form action="index.html">
            <label for="email">Email or mobile phone number</label>
            <input type="text" id="email" placeholder="you@email.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="At least 6 characters" required>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <p class="login-footer-links">
            By continuing, you agree to TechOne's <a href="#">Conditions of Use</a> and <a href="#">Privacy Notice</a>.
        </p>
        <p class="login-footer-links">
            <a href="#"><i class="fa-solid fa-caret-right"></i> Need help?</a>
        </p>
    </div>

    <div class="new-user-section">
        <p>New to TechOne?</p>
        <a href="signup.html" style="text-decoration: none;">
            <button class="create-account-btn">Create your TechOne account</button>
        </a>
    </div>

    <div style="font-size: 0.75rem; color: #8b949e; display: flex; gap: 20px; margin-bottom: 15px; margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">


        <a href="#" style="color: #8b949e; text-decoration: none;">Conditions of Use</a>
        <a href="#" style="color: #8b949e; text-decoration: none;">Privacy Notice</a>
        <a href="#" style="color: #8b949e; text-decoration: none;">Help</a>
    </div>
    <p style="font-size: 0.7rem; color: #6b7280;">© 2026 TechOne Limited</p>

</body>
</html>
