    function updateBadges() {
        const cart = JSON.parse(localStorage.getItem('techone_cart')) || [];
        document.querySelectorAll('.cart-badge').forEach(b => b.textContent = cart.reduce((sum, item) => sum + item.quantity, 0));

        const wishlist = JSON.parse(localStorage.getItem('techone_wishlist')) || [];
        document.querySelectorAll('.wishlist-badge').forEach(b => b.textContent = wishlist.length);

        const compare = JSON.parse(localStorage.getItem('techone_compare')) || [];
        document.querySelectorAll('.compare-badge').forEach(b => b.textContent = compare.length);
    }

    function getCategorySpecs(items) {
        if(items.length === 0) return [];
        let t = items[0].tag.toLowerCase();
        if(t.includes('laptop')) { return [ {label: "Processor", icon: "fa-microchip"}, {label: "Storage", icon: "fa-memory"}, {label: "Battery", icon: "fa-battery-half"}, {label: "Display", icon: "fa-display"} ]; }
        if (t.includes('gaming') || t.includes('pad')) { return [ {label: "Response", icon: "fa-gauge-high"}, {label: "Controls", icon: "fa-bolt"}, {label: "Build", icon: "fa-shield-check"}, {label: "Customization", icon: "fa-code"} ]; }
        if (t.includes('audio') || t.includes('ear') || t.includes('head')) { return [ {label: "Audio Quality", icon: "fa-music"}, {label: "Acoustics", icon: "fa-volume-high"}, {label: "Design", icon: "fa-headphones"}, {label: "Microphone", icon: "fa-microphone"} ]; }
        if (t.includes('dji') || t.includes('drone')) { return [ {label: "Camera", icon: "fa-plane-up"}, {label: "Range", icon: "fa-tower-broadcast"}, {label: "Stabilization", icon: "fa-camera-viewfinder"}, {label: "Wind Resist", icon: "fa-wind"} ]; }
        if (t.includes('camera') || t.includes('lens')) { return [ {label: "Autofocus", icon: "fa-bullseye"}, {label: "Video", icon: "fa-video"}, {label: "Durability", icon: "fa-shield"}, {label: "Optics", icon: "fa-circle-notch"} ]; }
        return [ {label: "Shipping", icon: "fa-truck-fast"}, {label: "Warranty", icon: "fa-check-circle"}, {label: "Returns", icon: "fa-clock-rotate-left"}, {label: "Quality", icon: "fa-star"} ];
    }

    function getProductSpecs(tag) {
        let t = tag.toLowerCase();
        if(t.includes('laptop')) { return ['High-Performance CPU', 'Fast NVMe SSD Storage', 'Long-Life Battery', 'Pro-Grade IPS Display']; }
        if (t.includes('gaming') || t.includes('pad')) { return ['Low-Latency Response', 'Fast-Acting Triggers', 'Quality Verified', 'Fully Programmable']; }
        if (t.includes('audio') || t.includes('ear') || t.includes('head')) { return ['Hi-Resolution Audio', 'Precision Tuned', 'Ergonomic Fit', 'Studio Clear Mic']; }
        if (t.includes('dji') || t.includes('drone')) { return ['4K UHD Aerial Imaging', 'Extended Signal Range', '3-Axis Gimbal', 'Wind Stable']; }
        if (t.includes('camera') || t.includes('lens')) { return ['High-Focus Precision', '4K Video Ready', 'Durable Construction', 'Premium Optics']; }
        return ['Express Logistics', 'Official Warranty', 'Easy Returns', 'Quality Assured'];
    }

    function renderCompare() {
        const container = document.getElementById('compare-container');
        const searchWrapper = document.getElementById('compare-search-wrapper');
        const compareData = JSON.parse(localStorage.getItem('techone_compare')) || [];
        
        if (compareData.length === 0) {
            container.innerHTML = `
                <div class="empty-compare">
                    <i class="fa-solid fa-table-list"></i>
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 10px;">Your Matrix is Empty</h2>
                    <p style="color: #8b949e; margin-bottom: 30px;">Add items to build a professional side-by-side technical comparison.</p>
                    <a href="index.html" class="continue-shopping-btn" style="padding: 15px 40px; border-radius: 30px;">
                        Build Matrix
                    </a>
                </div>
            `;
            searchWrapper.style.display = 'block';
            updateBadges();
            return;
        }

        searchWrapper.style.display = 'block';
        let specsLabels = getCategorySpecs(compareData);
        
        let matrixHtml = '<div class="matrix-table-wrapper"><table class="matrix-table">';
        
        // Header Row
        matrixHtml += '<thead><tr>';
        matrixHtml += '<th class="matrix-corner"><h3>Tech Specs</h3><p>' + compareData[0].tag + '</p></th>';
        
        compareData.forEach((item, index) => {
            matrixHtml += `
                <th class="matrix-product-head" style="animation: fadeInUp ${0.3 + index * 0.1}s ease backwards">
                    <button class="matrix-remove" onclick="removeFromCompare('${item.name}')">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <div class="matrix-img" style="background-image: url('${item.img}');"></div>
                    <h3 class="matrix-title">${item.name}</h3>
                    <div class="matrix-price">${item.price}</div>
                    <button onclick='moveToCart(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="matrix-buy-btn">
                        <i class="fa-solid fa-cart-shopping" style="margin-right: 5px;"></i> Buy Pick
                    </button>
                </th>
            `;
        });
        matrixHtml += '</tr></thead>';
        
        // Body (Specs)
        matrixHtml += '<tbody>';
        specsLabels.forEach((specObj, specIndex) => {
            matrixHtml += `<tr class="matrix-row" style="animation: fadeInUp ${0.5 + specIndex * 0.1}s ease backwards">`;
            matrixHtml += `<td class="matrix-label"><i class="fa-solid ${specObj.icon}"></i> <span>${specObj.label}</span></td>`;
            compareData.forEach(item => {
                let pSpecs = getProductSpecs(item.tag);
                let val = pSpecs[specIndex] || '-';
                matrixHtml += `<td class="matrix-value">${val}</td>`;
            });
            matrixHtml += `</tr>`;
        });
        
        matrixHtml += '</tbody></table></div>';
        container.innerHTML = matrixHtml;
        updateBadges();
    }

    function removeFromCompare(name) {
        let compareData = JSON.parse(localStorage.getItem('techone_compare')) || [];
        compareData = compareData.filter(item => item.name !== name);
        localStorage.setItem('techone_compare', JSON.stringify(compareData));
        renderCompare();
    }

    function moveToCart(product) {
        let cart = JSON.parse(localStorage.getItem('techone_cart')) || [];
        const existing = cart.find(i => i.name === product.name);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        localStorage.setItem('techone_cart', JSON.stringify(cart));
        updateBadges();
        alert("Added to cart!");
    }

    function toggleCompare(product) {
        let compare = JSON.parse(localStorage.getItem('techone_compare')) || [];
        const index = compare.findIndex(item => item.name === product.name);
        if (index > -1) return; // Already exists

        if (compare.length > 0 && product.tag !== compare[0].tag) {
            alert(`Can only compare products of the same type (${compare[0].tag}).`);
            return;
        }
        
        if (compare.length >= 4) {
            alert(`You can only compare up to 4 items at once.`);
            return;
        }

        compare.push(product);
        localStorage.setItem('techone_compare', JSON.stringify(compare));
        updateBadges();
        renderCompare();
    }

    // --- AUTOCOMPLETE LOGIC ---
    const searchInput = document.getElementById('compare-page-search');
    const dropdown = document.getElementById('autocomplete-dropdown');

    searchInput.addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();
        dropdown.innerHTML = '';
        
        if (!query) {
            dropdown.classList.remove('active');
            return;
        }

        const compareData = JSON.parse(localStorage.getItem('techone_compare')) || [];
        const activeTag = compareData.length > 0 ? compareData[0].tag : null;

        const results = PRODUCT_CATALOG.filter(item => {
            const matchesQuery = item.name.toLowerCase().includes(query);
            const matchesTag = activeTag ? (item.tag === activeTag) : true;
            const notAlreadyInCompare = !compareData.some(c => c.name === item.name);
            return matchesQuery && matchesTag && notAlreadyInCompare;
        });

        if (results.length === 0) {
            dropdown.innerHTML = '<div style="padding: 15px; color:#6c757d;">No matching products found.</div>';
            dropdown.classList.add('active');
            return;
        }

        results.slice(0, 5).forEach(item => {
            const el = document.createElement('div');
            el.className = 'autocomplete-item';
            el.innerHTML = `
                <img src="${item.img}" alt="">
                <div class="autocomplete-item-details">
                    <span class="autocomplete-item-name">${item.name}</span>
                    <span class="autocomplete-item-price">${item.price}</span>
                </div>
            `;
            el.addEventListener('click', () => {
                toggleCompare(item);
                searchInput.value = '';
                dropdown.classList.remove('active');
            });
            dropdown.appendChild(el);
        });
        
        dropdown.classList.add('active');
    });

    document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('active');
        }
    });

    // Initial render
    renderCompare();
</script>

</body>
</html>
